<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Délı̨nę 360 Panorama Gallery</title>

  <!-- Pannellum 360 viewer -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .pano-gallery {
      max-width: 1200px;
      height: 760px;
      margin: 35px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 22px;
    }

    .pano-main {
      position: relative;
      height: 760px;
      background: #000000;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
    }

    #panorama {
      width: 100%;
      height: 100%;
    }

    .pano-title {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.58);
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
    }

    .pano-open {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.58);
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .pano-open:hover {
      background: rgba(0,0,0,0.82);
    }

    .pano-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 48px;
      height: 66px;
      border: none;
      border-radius: 8px;
      background: rgba(0,0,0,0.48);
      color: #ffffff;
      font-size: 30px;
      cursor: pointer;
    }

    .pano-arrow:hover {
      background: rgba(0,0,0,0.78);
    }

    .pano-prev {
      left: 14px;
    }

    .pano-next {
      right: 14px;
    }

    .pano-side {
      height: 760px;
      background: #f2f2f2;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
      box-sizing: border-box;
      overflow-y: auto;
    }

    .pano-side-title {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      margin: 4px 0 12px 0;
    }

    .pano-thumb {
      width: 100%;
      margin-bottom: 12px;
      border-radius: 9px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.68;
      border: 3px solid transparent;
      background: #dddddd;
      box-sizing: border-box;
    }

    .pano-thumb:hover {
      opacity: 1;
    }

    .pano-thumb.active {
      opacity: 1;
      border-color: #2b6cb0;
    }

    .pano-thumb img {
      width: 100%;
      height: 95px;
      object-fit: cover;
      display: block;
    }

    .pano-thumb-caption {
      padding: 7px 8px;
      font-size: 13px;
      font-weight: 600;
      background: #ffffff;
    }

    .info-hotspot {
      height: 26px;
      width: 26px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid #2b6cb0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
      cursor: pointer;
    }

    .info-hotspot::after {
      content: "i";
      display: block;
      text-align: center;
      color: #2b6cb0;
      font-weight: 800;
      font-size: 17px;
      line-height: 22px;
    }

    .info-tooltip {
      position: absolute;
      background: rgba(0,0,0,0.82);
      color: #ffffff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.35;
      max-width: 240px;
      min-width: 170px;
      margin-left: 34px;
      margin-top: -8px;
      display: none;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    }

    .info-hotspot:hover .info-tooltip {
      display: block;
    }

    @media screen and (max-width: 850px) {
      .pano-gallery {
        grid-template-columns: 1fr;
        height: auto;
      }

      .pano-main {
        height: 520px;
      }

      .pano-side {
        height: auto;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .pano-side-title {
        display: none;
      }

      #pano-thumbs {
        display: flex;
        gap: 10px;
      }

      .pano-thumb {
        width: 150px;
        flex-shrink: 0;
      }

      .pano-thumb img {
        height: 85px;
      }
    }
  </style>
</head>

<body>

  <div class="pano-gallery">

    <div class="pano-main">
      <div id="pano-title" class="pano-title">
        Panorama 1
      </div>

      <a id="pano-open" class="pano-open" href="#" target="_blank">
        Open full image
      </a>

      <button id="pano-prev" class="pano-arrow pano-prev">
        &#10094;
      </button>

      <div id="panorama"></div>

      <button id="pano-next" class="pano-arrow pano-next">
        &#10095;
      </button>
    </div>

    <div class="pano-side">
      <div class="pano-side-title">
        360 Views
      </div>

      <div id="pano-thumbs"></div>
    </div>

  </div>

  <script>
    const panoramas = [
      {
        title: "Behind TK Building",
        panorama: "PANNO Behind TK building.jpg",
        thumb: "PANNO Behind TK building.jpg",
        full: "PANNO Behind TK building.jpg",

        hotSpots: [
          {
            pitch: 0,
            yaw: 0,
            text: "Behind TK Building. Replace this label after choosing the final point."
          }
        ]
      },

      {
        title: "Délı̨nę from Coop",
        panorama: "PANNO Deline From Coop.jpg",
        thumb: "PANNO Deline From Coop.jpg",
        full: "PANNO Deline From Coop.jpg",

        hotSpots: [
          {
            pitch: 0,
            yaw: 0,
            text: "Délı̨nę from Coop. Replace this label after choosing the final point."
          }
        ]
      },

      {
        title: "On the Lake at Night",
        panorama: "PANNO On lake at night.jpg",
        thumb: "PANNO On lake at night.jpg",
        full: "PANNO On lake at night.jpg",

        hotSpots: [
          {
            pitch: 0,
            yaw: 0,
            text: "On the lake at night. Replace this label after choosing the final point."
          }
        ]
      },

      {
        title: "On the Lake with Fog",
        panorama: "PANNO On lake with fog.jpg",
        thumb: "PANNO On lake with fog.jpg",
        full: "PANNO On lake with fog.jpg",

        hotSpots: [
          {
            pitch: 0,
            yaw: 0,
            text: "On the lake with fog. Replace this label after choosing the final point."
          }
        ]
      }
    ];

    let currentIndex = 0;
    let viewer = null;

    const titleEl = document.getElementById("pano-title");
    const openEl = document.getElementById("pano-open");
    const thumbsEl = document.getElementById("pano-thumbs");

    function createTooltip(hotSpotDiv, args) {
      hotSpotDiv.classList.add("info-hotspot");

      const tooltip = document.createElement("div");
      tooltip.className = "info-tooltip";
      tooltip.innerHTML = args.text;

      hotSpotDiv.appendChild(tooltip);
    }

    function getHotspots(points) {
      return points.map(function(point) {
        return {
          pitch: point.pitch,
          yaw: point.yaw,
          type: "info",
          text: point.text,
          createTooltipFunc: createTooltip,
          createTooltipArgs: {
            text: point.text
          }
        };
      });
    }

    function loadPanorama() {
      const item = panoramas[currentIndex];

      if (viewer) {
        viewer.destroy();
      }

      titleEl.textContent = item.title;
      openEl.href = item.full;

      viewer = pannellum.viewer("panorama", {
        type: "equirectangular",
        panorama: item.panorama,
        autoLoad: true,
        showControls: true,
        compass: false,
        mouseZoom: true,
        draggable: true,
        hfov: 100,
        minHfov: 5,
        maxHfov: 110,

        /*
          TEMPORARY DEBUG MODE:
          Keep this true while placing labels.

          How to get coordinates:
          1. Open your GitHub Pages panorama page.
          2. Right click → Inspect.
          3. Open the Console tab.
          4. Click inside the panorama where you want a label.
          5. Copy the pitch and yaw values from the console.

          After labels are finalized, change this to false.
        */
        hotSpotDebug: true,

        hotSpots: getHotspots(item.hotSpots)
      });

      updateThumbs();
    }

    function updateThumbs() {
      thumbsEl.innerHTML = "";

      panoramas.forEach(function(item, index) {
        const thumb = document.createElement("div");
        thumb.className = "pano-thumb";

        if (index === currentIndex) {
          thumb.classList.add("active");
        }

        const img = document.createElement("img");
        img.src = item.thumb;
        img.alt = item.title;

        const caption = document.createElement("div");
        caption.className = "pano-thumb-caption";
        caption.textContent = item.title;

        thumb.appendChild(img);
        thumb.appendChild(caption);

        thumb.addEventListener("click", function() {
          currentIndex = index;
          loadPanorama();
        });

        thumbsEl.appendChild(thumb);
      });
    }

    function previousPanorama() {
      currentIndex--;

      if (currentIndex < 0) {
        currentIndex = panoramas.length - 1;
      }

      loadPanorama();
    }

    function nextPanorama() {
      currentIndex++;

      if (currentIndex >= panoramas.length) {
        currentIndex = 0;
      }

      loadPanorama();
    }

    document.getElementById("pano-prev").addEventListener("click", previousPanorama);
    document.getElementById("pano-next").addEventListener("click", nextPanorama);

    loadPanorama();
  </script>

</body>
</html>
