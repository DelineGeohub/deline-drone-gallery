<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Délı̨nę 360 Panorama Gallery</title>

  <!-- Pannellum 360 viewer -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .pano-gallery {
      max-width: 1200px;
      height: 760px;
      margin: 35px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 22px;
    }

    .pano-main {
      position: relative;
      height: 760px;
      background: #000000;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
    }

    #panorama {
      width: 100%;
      height: 100%;
    }

    .pano-title {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.58);
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
    }

    .pano-open {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.58);
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .pano-open:hover {
      background: rgba(0,0,0,0.82);
    }

    .pano-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 48px;
      height: 66px;
      border: none;
      border-radius: 8px;
      background: rgba(0,0,0,0.48);
      color: #ffffff;
      font-size: 30px;
      cursor: pointer;
    }

    .pano-arrow:hover {
      background: rgba(0,0,0,0.78);
    }

    .pano-prev {
      left: 14px;
    }

    .pano-next {
      right: 14px;
    }

    .pano-side {
      height: 760px;
      background: #f2f2f2;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
      box-sizing: border-box;
      overflow-y: auto;
    }

    .pano-side-title {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      margin: 4px 0 12px 0;
    }

    .pano-thumb {
      width: 100%;
      margin-bottom: 12px;
      border-radius: 9px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.68;
      border: 3px solid transparent;
      background: #dddddd;
      box-sizing: border-box;
    }

    .pano-thumb:hover {
      opacity: 1;
    }

    .pano-thumb.active {
      opacity: 1;
      border-color: #2b6cb0;
    }

    .pano-thumb img {
      width: 100%;
      height: 95px;
      object-fit: cover;
      display: block;
    }

    .pano-thumb-caption {
      padding: 7px 8px;
      font-size: 13px;
      font-weight: 600;
      background: #ffffff;
    }

    .info-hotspot {
      height: 26px;
      width: 26px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid #2b6cb0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
      cursor: pointer;
    }

    .info-hotspot::after {
      content: "i";
      display: block;
      text-align: center;
      color: #2b6cb0;
      font-weight: 800;
      font-size: 17px;
      line-height: 22px;
    }

    .info-tooltip {
      position: absolute;
      background: rgba(0,0,0,0.82);
      color: #ffffff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.35;
      max-width: 240px;
      min-width: 170px;
      margin-left: 34px;
      margin-top: -8px;
      display: none;
      pointer-events: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    }

    .info-hotspot:hover .info-tooltip {
      display: block;
    }

    /* Coordinate box for all panoramas */
    .pano-coordinate-box {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 35;
      min-width: 290px;
      background: rgba(0,0,0,0.78);
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      line-height: 1.45;
      pointer-events: auto;
      user-select: text;
      box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    }

    .pano-coordinate-box button {
      margin-top: 7px;
      padding: 5px 9px;
      border: none;
      border-radius: 5px;
      background: #ffffff;
      color: #000000;
      font-weight: 700;
      cursor: pointer;
    }

    .pano-coordinate-box button:hover {
      background: #e5e5e5;
    }

    @media screen and (max-width: 850px) {
      .pano-gallery {
        grid-template-columns: 1fr;
        height: auto;
      }

      .pano-main {
        height: 520px;
      }

      .pano-side {
        height: auto;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .pano-side-title {
        display: none;
      }

      #pano-thumbs {
        display: flex;
        gap: 10px;
      }

      .pano-thumb {
        width: 150px;
        flex-shrink: 0;
      }

      .pano-thumb img {
        height: 85px;
      }

      .pano-coordinate-box {
        min-width: 230px;
        font-size: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="pano-gallery">

    <div class="pano-main">
      <div id="pano-title" class="pano-title">
        Panorama 1
      </div>

      <a id="pano-open" class="pano-open" href="#" target="_blank">
        Open full image
      </a>

      <button id="pano-prev" class="pano-arrow pano-prev">
        &#10094;
      </button>

      <div id="panorama"></div>

      <button id="pano-next" class="pano-arrow pano-next">
        &#10095;
      </button>

      <div id="pano-coordinate-box" class="pano-coordinate-box">
        Center coordinate:
        pitch <span id="center-pitch">0.00</span>,
        yaw <span id="center-yaw">0.00</span>
        <br>
        <button id="copy-center-coordinate" type="button">
          Copy hotspot code
        </button>
      </div>
    </div>

    <div class="pano-side">
      <div class="pano-side-title">
        360 Views
      </div>

      <div id="pano-thumbs"></div>
    </div>

  </div>

  <script>
    const panoramas = [
      {
        title: "Behind TK Building",
        panorama: "PANNO Behind TK building.jpg",
        thumb: "PANNO Behind TK building.jpg",
        full: "PANNO Behind TK building.jpg",

        // Start view direction: Main Office
        initialPitch: -21.85,
        initialYaw: -123.57,

        hotSpots: [
          {
            pitch: -21.85,
            yaw: -123.57,
            text: "Main Office"
          },
          {
            pitch: -19.31,
            yaw: -117.51,
            text: "Aurora College"
          },
          {
            pitch: -17.82,
            yaw: -123.33,
            text: "Culture Center"
          },
          {
            pitch: -14.85,
            yaw: -122.80,
            text: "Great Bear CO-OP"
          },
          {
            pitch: -13.47,
            yaw: -130.49,
            text: "Wellness Center"
          },
          {
            pitch: -12.44,
            yaw: -135.48,
            text: "Church"
          },
          {
            pitch: -12.16,
            yaw: -138.55,
            text: "Bishop House"
          },
          {
            pitch: -10.77,
            yaw: -139.50,
            text: "Water Treatment Plant"
          },
          {
            pitch: -11.12,
            yaw: -168.25,
            text: "Baseball Diamond"
          },
          {
            pitch: -32.03,
            yaw: -166.03,
            text: "High School"
          },
          {
            pitch: -54.14,
            yaw: -154.44,
            text: "Arena"
          },
          {
            pitch: -45.45,
            yaw: 147.23,
            text: "Daycare Center"
          },
          {
            pitch: -49.57,
            yaw: 61.37,
            text: "TK Building"
          },
          {
            pitch: -6.83,
            yaw: 6.87,
            text: "Gas Station"
          },
          {
            pitch: -3.66,
            yaw: 40.07,
            text: "Garbage Dump"
          },
          {
            pitch: -1.29,
            yaw: 35.64,
            text: "Airport Strip"
          },
          {
            pitch: -2.59,
            yaw: -15.12,
            text: "Ski Hill & Golf Course"
          },
          {
            pitch: -9.42,
            yaw: -38.84,
            text: "Grey Goose Lodge"
          },
          {
            pitch: -7.47,
            yaw: -40.30,
            text: "Cemetery"
          },
          {
            pitch: -23.07,
            yaw: -90.47,
            text: "Northern Store"
          },
          {
            pitch: -22.02,
            yaw: -100.76,
            text: "RCMP"
          },
          {
            pitch: -17.89,
            yaw: -49.53,
            text: "Nurse Station"
          },
          {
            pitch: -4.54,
            yaw: -38.09,
            text: "Little Lake"
          }
        ]
      },

      {
        title: "Délı̨nę from TK Building - Rain",
        panorama: "PANNO Deline From TK (rain).jpg",
        thumb: "PANNO Deline From TK (rain).jpg",
        full: "PANNO Deline From TK (rain).jpg",

        initialPitch: 0,
        initialYaw: 0,

        hotSpots: [
          {
            pitch: 0,
            yaw: 0,
            text: "Délı̨nę from TK Building - Rain. Replace this label after choosing the final point."
          }
        ]
      },

      {
        title: "On the Lake at Night",
        panorama: "PANNO On lake at night.jpg",
        thumb: "PANNO On lake at night.jpg",
        full: "PANNO On lake at night.jpg",

        initialPitch: 0,
        initialYaw: 0,

        hotSpots: [
          {
            pitch: 0,
            yaw: 0,
            text: "On the lake at night. Replace this label after choosing the final point."
          }
        ]
      },

      {
        title: "On the Lake with Fog",
        panorama: "PANNO On lake with fog.jpg",
        thumb: "PANNO On lake with fog.jpg",
        full: "PANNO On lake with fog.jpg",

        initialPitch: 0,
        initialYaw: 0,

        hotSpots: [
          {
            pitch: 0,
            yaw: 0,
            text: "On the lake with fog. Replace this label after choosing the final point."
          }
        ]
      }
    ];

    let currentIndex = 0;
    let viewer = null;

    const titleEl = document.getElementById("pano-title");
    const openEl = document.getElementById("pano-open");
    const thumbsEl = document.getElementById("pano-thumbs");
    const centerPitchEl = document.getElementById("center-pitch");
    const centerYawEl = document.getElementById("center-yaw");
    const copyCenterCoordinateButton = document.getElementById("copy-center-coordinate");

    function createTooltip(hotSpotDiv, args) {
      hotSpotDiv.classList.add("info-hotspot");

      const tooltip = document.createElement("div");
      tooltip.className = "info-tooltip";
      tooltip.innerHTML = args.text;

      hotSpotDiv.appendChild(tooltip);
    }

    function getHotspots(points) {
      return points.map(function(point) {
        return {
          pitch: point.pitch,
          yaw: point.yaw,
          type: "info",
          text: point.text,
          createTooltipFunc: createTooltip,
          createTooltipArgs: {
            text: point.text
          }
        };
      });
    }

    function updateCenterCoordinateDisplay() {
      if (!viewer) {
        return;
      }

      centerPitchEl.textContent = viewer.getPitch().toFixed(2);
      centerYawEl.textContent = viewer.getYaw().toFixed(2);
    }

    function copyCenterHotspotCode() {
      if (!viewer) {
        return;
      }

      const pitch = viewer.getPitch().toFixed(2);
      const yaw = viewer.getYaw().toFixed(2);

      const hotspotCode =
`{
  pitch: ${pitch},
  yaw: ${yaw},
  text: "Write your label text here."
}`;

      navigator.clipboard.writeText(hotspotCode).then(function() {
        copyCenterCoordinateButton.textContent = "Copied!";
        setTimeout(function() {
          copyCenterCoordinateButton.textContent = "Copy hotspot code";
        }, 1400);
      }).catch(function() {
        alert(hotspotCode);
      });
    }

    function loadPanorama() {
      const item = panoramas[currentIndex];

      if (viewer) {
        viewer.destroy();
      }

      titleEl.textContent = item.title;
      openEl.href = item.full;

      viewer = pannellum.viewer("panorama", {
        type: "equirectangular",
        panorama: item.panorama,
        autoLoad: true,
        showControls: true,
        compass: false,
        mouseZoom: true,
        draggable: true,

        /*
          Zoom setting:
          Smaller hfov = more zoomed in.
          minHfov: 1 allows very close zoom.
        */
        hfov: 100,
        minHfov: 1,
        maxHfov: 110,

        // Start direction for each panorama
        pitch: item.initialPitch || 0,
        yaw: item.initialYaw || 0,

        /*
          Keep this true while you are filling hotspots.
          It helps with coordinate debugging too.
        */
        hotSpotDebug: true,

        hotSpots: getHotspots(item.hotSpots)
      });

      viewer.on("load", updateCenterCoordinateDisplay);
      viewer.on("mouseup", updateCenterCoordinateDisplay);
      viewer.on("touchend", updateCenterCoordinateDisplay);
      viewer.on("animatefinished", updateCenterCoordinateDisplay);
      viewer.on("zoomchange", updateCenterCoordinateDisplay);

      updateCenterCoordinateDisplay();
      updateThumbs();
    }

    function updateThumbs() {
      thumbsEl.innerHTML = "";

      panoramas.forEach(function(item, index) {
        const thumb = document.createElement("div");
        thumb.className = "pano-thumb";

        if (index === currentIndex) {
          thumb.classList.add("active");
        }

        const img = document.createElement("img");
        img.src = item.thumb;
        img.alt = item.title;

        const caption = document.createElement("div");
        caption.className = "pano-thumb-caption";
        caption.textContent = item.title;

        thumb.appendChild(img);
        thumb.appendChild(caption);

        thumb.addEventListener("click", function() {
          currentIndex = index;
          loadPanorama();
        });

        thumbsEl.appendChild(thumb);
      });
    }

    function previousPanorama() {
      currentIndex--;

      if (currentIndex < 0) {
        currentIndex = panoramas.length - 1;
      }

      loadPanorama();
    }

    function nextPanorama() {
      currentIndex++;

      if (currentIndex >= panoramas.length) {
        currentIndex = 0;
      }

      loadPanorama();
    }

    document.getElementById("pano-prev").addEventListener("click", previousPanorama);
    document.getElementById("pano-next").addEventListener("click", nextPanorama);
    copyCenterCoordinateButton.addEventListener("click", copyCenterHotspotCode);

    loadPanorama();
  </script>

</body>
</html>
